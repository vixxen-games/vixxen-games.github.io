<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Snake Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 5px solid #444;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            background-color: #000;
        }
        .info {
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div><a href="/.." style="color: white; text-decoration: none;">Home</a></div>
    <h1>Snake Game</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="info">
        <p>Score: <span id="score">0</span></p>
        <p>Use Arrow Keys to Move</p>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let score = 0;
        let dx = 0;
        let dy = 0;
        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};

        function main() {
            if (didGameEnd()) {
                alert(`Game Over! Score: ${score}`);
                location.reload();
                return;
            }

            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, 100);
        }

        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            ctx.fillStyle = "lime";
            snake.forEach(part => {
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerHTML = score;
                createFood();
            } else {
                snake.pop();
            }
        }

        function didGameEnd() {
            if (dx === 0 && dy === 0) return false;
            const head = snake[0];
            const hitWall = head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount;
            const hitSelf = snake.slice(1).some(part => part.x === head.x && part.y === head.y);
            return hitWall || hitSelf;
        }

        function createFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
        }

        function drawFood() {
            ctx.fillStyle = "red";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        document.addEventListener("keydown", (e) => {
            const LEFT_KEY = 37, UP_KEY = 38, RIGHT_KEY = 39, DOWN_KEY = 40;
            if (e.keyCode === LEFT_KEY && dx === 0) { dx = -1; dy = 0; }
            if (e.keyCode === UP_KEY && dy === 0) { dx = 0; dy = -1; }
            if (e.keyCode === RIGHT_KEY && dx === 0) { dx = 1; dy = 0; }
            if (e.keyCode === DOWN_KEY && dy === 0) { dx = 0; dy = 1; }
        });

        main();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Ball Catch Game</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; background: #000000; color: #ffffff}
        #game-board { 
            position: relative; width: 400px; height: 400px; 
            margin: 20px auto; border: 2px solid #333; background: white; 
        }
        #ball { 
            width: 30px; height: 30px; background: red; border-radius: 50%; 
            position: absolute; cursor: pointer; transition: 0.1s;
        }
    </style>
</head>
<body>
    <div><a href="/.." style="color: white; text-decoration: none;">Home</a></div>
    <h1>Score: <span id="score">0</span></h1>
    <div id="game-board">
        <div id="ball"></div>
    </div>
    <script>
        let score = 0;
        const ball = document.getElementById("ball");
        const scoreDisplay = document.getElementById("score");

        function moveBall() {
            const x = Math.floor(Math.random() * 370);
            const y = Math.floor(Math.random() * 370);
            ball.style.left = x + "px";
            ball.style.top = y + "px";
        }

        ball.onclick = function() {
            score++;
            scoreDisplay.textContent = score;
            moveBall();
        };

        // Move the ball every 1 second automatically
        setInterval(moveBall, 1000);
    </script>
</body>
</html>

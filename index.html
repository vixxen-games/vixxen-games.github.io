<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vixxen Games | Play Free Games</title>
    <style>
        /* CSS Styles */
        :root { --primary: #00ff88; --bg: #0f172a; --card-bg: #1e293b; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; }
        nav { padding: 1.5rem; display: flex; justify-content: space-between; background: #1e293b; }
        .hero { text-align: center; padding: 4rem 1rem; background: linear-gradient(to bottom, #1e293b, #0f172a); }
        .game-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 2rem; 
            padding: 2rem; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        .game-card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            overflow: hidden; 
            transition: transform 0.3s; 
            border: 1px solid #334155;
        }
        .game-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .thumbnail { height: 160px; background: #334155; display: flex; align-items: center; justify-content: center; }
        .info { padding: 1.5rem; }
        .btn { 
            display: inline-block; 
            background: var(--primary); 
            color: #000; 
            padding: 0.5rem 1rem; 
            border-radius: 6px; 
            text-decoration: none; 
            font-weight: bold; 
        }
    </style>
</head>
<body>
    <nav>
        <div style="font-size: 1.5rem; font-weight: bold; color: var(--primary);">VIXXEN GAMES</div>
        <div><a href="#" style="color: white; text-decoration: none;">Home</a></div>
    </nav>

    <section class="hero">
        <h1>Ultimate Browser Games</h1>
        <p>Instant play. No downloads required.</p>
    </section>

    <main class="game-grid">
        <!-- Game Item 1 -->
        <article class="game-card">
            <div class="thumbnail">🎮</div>
            <div class="info">
                <h3>Snake</h3>
                <p>be a snake</p>
                <a href="games/snake.html" class="btn">Play Now</a>
            </div>
        </article>

        <!-- Game Item 2 -->
        <!--- <article class="game-card">
            <div class="thumbnail">🧩</div>
            <div class="info">
                <h3>Logic Master</h3>
                <p>Challenging puzzles for sharp minds.</p>
                <a href="game2.html" class="btn">Play Now</a>
            </div>
        </article> --->
    </main>

    <footer style="text-align: center; padding: 2rem; border-top: 1px solid #334155; margin-top: 2rem;">
        <p>&copy; 2024 Arcade Hub</p>
    </footer>
</body>
</html>
